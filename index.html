<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WA Pairing Test - Vercel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #075E54 0%, #128C7E 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 28px;
            padding: 32px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        h1 { color: #075E54; font-size: 26px; margin-bottom: 8px; }
        .sub { color: #666; margin-bottom: 28px; font-size: 14px; }
        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #ddd;
            border-radius: 14px;
            font-size: 16px;
            margin-bottom: 16px;
        }
        input:focus { outline: none; border-color: #25D366; }
        button {
            width: 100%;
            background: #25D366;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        button:disabled { background: #aaa; cursor: not-allowed; }
        .status-box {
            margin-top: 24px;
            padding: 20px;
            background: #f0f2f5;
            border-radius: 16px;
            display: none;
        }
        .code {
            background: #075E54;
            color: white;
            font-size: 28px;
            font-family: monospace;
            text-align: center;
            padding: 16px;
            border-radius: 12px;
            letter-spacing: 4px;
            margin: 12px 0;
        }
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .badge-wait { background: #ffc107; }
        .badge-connected { background: #25D366; color: white; }
        .badge-error { background: #dc3545; color: white; }
        .warning {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 12px;
            margin-top: 20px;
            font-size: 12px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>📱 WA Pairing Test</h1>
        <div class="sub">Test koneksi WhatsApp via pairing code (Deploy di Vercel)</div>
        
        <input type="tel" id="phone" placeholder="6281234567890" value="62">
        <button id="btn" onclick="requestPairing()">🔗 Generate Pairing Code</button>
        
        <div id="statusBox" class="status-box">
            <span id="badge" class="badge"></span>
            <div id="codeDisplay" class="code"></div>
            <div id="message"></div>
        </div>
        
        <div class="warning">
            ⚠️ <strong>Peringatan untuk Vercel:</strong><br>
            Karena Vercel serverless, koneksi WA hanya bertahan < 60 detik.<br>
            Ini hanya untuk <strong>test cepat</strong>, bukan untuk bot permanen.<br>
            Untuk bot sungguhan, deploy ke <strong>Render, Railway, atau VPS</strong>.
        </div>
    </div>

    <script>
        let polling = null;
        
        async function requestPairing() {
            const phone = document.getElementById('phone').value.trim();
            if (!phone.match(/^62[0-9]{9,13}$/)) {
                alert('Format salah! Contoh: 6281234567890');
                return;
            }
            
            const btn = document.getElementById('btn');
            btn.disabled = true;
            btn.innerText = '⏳ Memproses...';
            
            try {
                const res = await fetch('/api/pair', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phoneNumber: phone })
                });
                const data = await res.json();
                
                if (data.success) {
                    document.getElementById('statusBox').style.display = 'block';
                    startPolling(phone);
                } else {
                    alert('Error: ' + (data.error || 'Unknown'));
                    btn.disabled = false;
                    btn.innerText = '🔗 Generate Pairing Code';
                }
            } catch(e) {
                alert('Gagal: ' + e.message);
                btn.disabled = false;
                btn.innerText = '🔗 Generate Pairing Code';
            }
        }
        
        function startPolling(phone) {
            if (polling) clearInterval(polling);
            
            polling = setInterval(async () => {
                try {
                    const res = await fetch(`/api/pair?phone=${phone}`);
                    const data = await res.json();
                    
                    const badge = document.getElementById('badge');
                    const codeDisplay = document.getElementById('codeDisplay');
                    const msg = document.getElementById('message');
                    
                    if (data.status === 'waiting' && data.pairingCode) {
                        badge.className = 'badge badge-wait';
                        badge.innerText = '⏳ Masukkan kode di WA HP';
                        codeDisplay.innerText = data.pairingCode;
                        msg.innerText = 'Buka WhatsApp → Setelan → Perangkat Tertaut → Tautkan dengan nomor telepon';
                    }
                    else if (data.status === 'connected') {
                        badge.className = 'badge badge-connected';
                        badge.innerText = '✅ TERHUBUNG!';
                        codeDisplay.innerText = '✓ Connected';
                        msg.innerText = 'WhatsApp berhasil terhubung!';
                        clearInterval(polling);
                        document.getElementById('btn').disabled = false;
                        document.getElementById('btn').innerText = '🔗 Generate Pairing Code';
                    }
                    else if (data.status === 'error') {
                        badge.className = 'badge badge-error';
                        badge.innerText = '❌ Error';
                        codeDisplay.innerText = 'Gagal';
                        msg.innerText = 'Terjadi error, coba lagi';
                        clearInterval(polling);
                        document.getElementById('btn').disabled = false;
                        document.getElementById('btn').innerText = '🔗 Generate Pairing Code';
                    }
                    else if (data.status === 'processing') {
                        badge.className = 'badge badge-wait';
                        badge.innerText = '⏳ Sedang memproses...';
                        codeDisplay.innerText = 'Loading...';
                        msg.innerText = 'Tunggu sebentar, sedang generate pairing code';
                    }
                } catch(e) {
                    console.error('Polling error:', e);
                }
            }, 3000);
        }
    </script>
</body>
</html>
